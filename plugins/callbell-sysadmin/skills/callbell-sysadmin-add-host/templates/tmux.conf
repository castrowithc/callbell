# ~/.tmux.conf base configuration (tmux >= 3.x)
#
# Install:
#   cp templates/tmux.conf ~/.tmux.conf
#   tmux kill-server        # if tmux is running: restart so the config takes effect
#   # or reload from inside:  Ctrl+B  then  :source-file ~/.tmux.conf
#
# This config is deliberately minimal and commented. Each line explains what it does.
# Plugins (the TPM block at the bottom) are optional and commented out by default.

# ---------------------------------------------------------------------------
# Basic behavior
# ---------------------------------------------------------------------------

# Enable the mouse: click panes, switch windows, scroll with the wheel.
set -g mouse on

# Start window and pane numbering at 1 (not 0), closer to the keyboard.
set -g base-index 1
setw -g pane-base-index 1

# Automatically close gaps in window numbering when a window is closed (1,2,3 instead of 1,3,4).
set -g renumber-windows on

# More scrollback history per pane (default: 2000 lines).
set -g history-limit 50000

# Faster response to Escape (matters for vim/nano in panes).
set -sg escape-time 10

# Terminal colors: 256 colors plus TrueColor, so editors look right.
# default-terminal gives tmux itself 256 colors; terminal-features tells tmux that the
# OUTER terminal (TERM=xterm-256color, e.g. Zed/VS Code/iTerm) can do 24-bit RGB.
# Without this line TrueColor would be downgraded to 256 colors.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Allow renaming a window immediately, but do not overwrite it automatically.
set -g allow-rename off

# ---------------------------------------------------------------------------
# Convenience keybindings (prefix stays Ctrl+B)
# ---------------------------------------------------------------------------

# Reload the config without a restart:  Ctrl+B  then  r
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Split panes with letters instead of %/". H = horizontal (side by side), V = vertical (stacked).
# These letters map directly to the tmux flags -h / -v. New panes open in the CURRENT directory.
#   Ctrl+B  then  h   splits side by side (left/right)
#   Ctrl+B  then  v   splits stacked (top/bottom)
bind h split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
# The default keys % and " stay active too (as a fallback).

# Open a new window in the current directory too:  Ctrl+B  then  c
bind c new-window -c "#{pane_current_path}"

# Switch between panes:  Ctrl+B  then  arrow keys  (tmux default, no config needed).

# ---------------------------------------------------------------------------
# Status bar (bottom line)
# ---------------------------------------------------------------------------

# Refresh the status bar every 5 seconds.
set -g status-interval 5

# Left: session name. Right: time plus date.
set -g status-left  " #S "
set -g status-left-length 30
set -g status-right " %H:%M  %Y-%m-%d "

# Highlight the active window.
set -g status-justify left

# ---------------------------------------------------------------------------
# Plugins (optional) via TPM (Tmux Plugin Manager)
# ---------------------------------------------------------------------------
#
# Enable in 3 steps:
#   1. Install TPM:
#        git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#   2. Uncomment the block below (remove the leading #).
#   3. In tmux:  Ctrl+B  then  I  (capital I)  installs the plugins.
#
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'     # sensible defaults
# set -g @plugin 'tmux-plugins/tmux-resurrect'    # save/restore sessions
# set -g @plugin 'tmux-plugins/tmux-continuum'    # auto-save every 15 min plus auto-restore
#
# # tmux-continuum: restore sessions automatically after a server restart
# set -g @continuum-restore 'on'
#
# # IMPORTANT: this line must be the LAST in the file.
# run '~/.tmux/plugins/tpm/tpm'
